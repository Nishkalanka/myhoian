  <!-- Critical CSS to prevent FOUC (Flash of Unstyled Content) -->
  <style>
    /* Prevent white flash on load */
    html,
    body {
      margin: 0;
      padding: 0;
      background-color: rgb(46, 46, 57);
    }

    /* Initial Preloader Styles */
    #initial-preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgb(46, 46, 57);
      z-index: 99999;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.6s ease-out, visibility 0.6s;
    }

    #initial-preloader img {
      width: 56px;
      height: auto;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.1);
        opacity: 0.8;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* Utility class to hide preloader */
    body.loaded #initial-preloader {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
  </style>
</head>

<body>

</body>
